document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

c.color }};\">{{ cc.name }}<\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <button onclick=\"{{ goVendors }}\" style=\"width:100%; border:none; border-radius:{{ radBtn }}; padding:15px; background:{{ accent }}; color:{{ accentInk }}; font-size:15px; font-weight:600; margin-top:22px; cursor:pointer; box-shadow:0 8px 20px {{ accentGlow }};\">Save vendor<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n          <\u002Fdiv>\n\n          <!-- BOTTOM NAV -->\n          <div style=\"position:absolute; left:0; right:0; bottom:0; height:84px; background:{{ navBg }}; border-top:1px solid {{ fieldBorder }}; backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); display:flex; align-items:flex-start; padding:10px 18px 0; z-index:40;\">\n            <div onclick=\"{{ goDash }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; color:{{ tabDash }};\"><span style=\"font-size:19px;\">▦<\u002Fspan><span style=\"font-size:10px;\">Home<\u002Fspan><\u002Fdiv>\n            <div onclick=\"{{ goVendors }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; color:{{ tabVendors }};\"><span style=\"font-size:19px;\">☷<\u002Fspan><span style=\"font-size:10px;\">Vendors<\u002Fspan><\u002Fdiv>\n            <div style=\"flex:1; display:flex; justify-content:center;\">\n              <div onclick=\"{{ goVoice }}\" style=\"width:54px; height:54px; border-radius:18px; background:{{ accent }}; margin-top:-14px; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 20px {{ accentGlow }}; cursor:pointer; color:{{ accentInk }}; font-size:22px;\">🎙<\u002Fdiv>\n            <\u002Fdiv>\n            <div onclick=\"{{ goTasks }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; color:{{ tabTasks }};\"> oklch(0.22 0.012 60)':'oklch(0.99 0.006 85)',\n      voiceScrim:dark?'rgba(0,0,0,0.55)':'rgba(40,34,28,0.4)',\n      ink:dark?'oklch(0.96 0.01 85)':'oklch(0.26 0.012 60)',\n      muted:dark?'oklch(0.72 0.012 70)':'oklch(0.48 0.012 60)',\n      faint:dark?'oklch(0.55 0.012 70)':'oklch(0.62 0.012 60)',\n      field:dark?'oklch(0.25 0.012 60)':'oklch(0.97 0.006 85)',\n      fieldBorder:dark?'oklch(0.32 0.012 60)':'oklch(0.91 0.008 80)',\n      track:dark?'oklch(0.30 0.012 60)':'oklch(0.92 0.008 80)',\n    };\n  }\n\n  btn(a){ return `border:none; cursor:pointer; padding:7px 13px; border-radius:9px; font-family:'Geist',sans-serif; font-size:13px; font-weight:500; ${a?'background:#3a342e; color:#fdf6ee;':'background:transparent; color:#7d756b;'}`; }\n  go(s){ return ()=>this.setState({screen:s}); }\n\n  renderVals(){\n    const t=this.theme(), s=this.state.screen;\n    const vendors=this.vendorData().map(v=>{\n      const pending=v.quoted-v.paid, pct=Math.round(v.paid/v.quoted*100);\n      const initials=v.name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();\n      return {...v, pending, pct, initials, paidStr:this.fmt(v.paid), pendingStr:this.fmt(pending), quotedStr:this.fmt(v.quoted),\n        payments:v.payments.map(p=>({...p, amountStr:this.fmt(p.amount), modeShort:p.mode.slice(0,3).toUpperCase(), label:p.label})),\n        open:()=>this.setState({screen:'vendorDetail', vendorId:v.id})};\n    });\n    const totalPaid=vendors.reduce((a,v)=>a+v.paid,0), totalQuoted=vendors.reduce((a,v)=>a+v.quoted,0);\n    const budget=1800000, pending=totalQuoted-totalPaid;\n    const sv=vendors.find(v=>v.id===this.state.vendorId)||vendors[0];\n\n    const cer=[\n      {name:'Haldi',date:'10 Dec',icon:'🌼'},{name:'Mehendi',date:'11 Dec',icon:'🌿'},\n      {name:'Sangeet',date:'11 Dec',icon:'🎶'},{name:'Wedding',date:'12 Dec',icon:'💍'},{name:'Reception',date:'13 Dec',icon:'✨'},\n    ];\n    const taskDefs={\n      Haldi:[['Confirm haldi paste quantity','Sharma Caterers'],['Marigold backdrop setup','Blooms by Riya']],\n      Sangeet:[['Share song playlist','DJ Karan'],['Stage lighting plan','Royal Tentwala'],['Makeup trial slot','Glow by Meher']],\n      Wedding:[['Final headcount to caterer','Sharma Caterers'],['Mandap floral mockup','Blooms by Riya'],['Photographer shot list','Lensbaba Studios']],\n    };\n    const done=this.state.done;\n    const taskGroups=Object.keys(taskDefs).map(name=>{\n      const icon=cer.find(c=>c.name===name).icon;\n      const tasks=taskDefs[name].map((td,i)=>{\n        const key=name+i, isDone=!!done[key];\n        return {desc:td[0], vendor:td[1], check:isDone?'✓':'',\n          checkBg:isDone?t.accent:'transparent', checkBorder:isDone?t.accent:t.fieldBorder,\n          textColor:isDone?t.faint:t.ink, strike:isDone?'line-through':'none',\n          border:i===0?'none':'1px solid '+t.fieldBorder,\n          toggle:()=>this.setState(st=>({done:{...st.done,[key]:!st.done[key]}}))};\n      });\n      const d=tasks.filter(x=>x.check).length;\n      return {name, icon, tasks, progress:d+'/'+tasks.length};\n    });\n    const ceremonies=cer.map(c=>{\n      const g=taskGroups.find(x=>x.name===c.name);\n      return {...c, taskStr:g?g.progress+' tasks':'· planning'};\n    });\n\n    return {\n      ...t,\n      isLogin:s==='login', isOnboard:s==='onboard', isVoice:s==='voice',\n      isApp:['dashboard','vendors','vendorDetail','tasks','add'].includes(s),\n      isDash:s==='dashboard', isVendors:s==='vendors', isVendorDetail:s==='vendorDetail', isTasks:s==='tasks', isAdd:s==='add',\n      vendors, attention:[...vendors].sort((a,b)=>b.pending-a.pending).slice(0,3), sv,\n      ceremonies, taskGroups,\n      vendorCount:vendors.length, budgetStr:this.fmt(budget), pendingStr:this.fmt(pending),\n      paidStr:this.fmt(totalPaid), committedStr:this.fmt(totalQuoted), paidPct:Math.round(totalPaid/totalQuoted*100),\n      daysToGo:168,\n      categories:['Catering','Photo & Video','Decor','Music','Makeup','Tenting','Priest'],\n      ceremonyChips:cer.map((c,i)=>({name:c.name, bg:i<2?t.accentGlow:t.field, border:i<2?t.accent:t.fieldBorder, color:i<2?t.accent:t.ink})),\n      tabDash:s==='dashboard'?t.accent:t.faint, tabVendors:(s==='vendors'||s==='vendorDetail'||s==='add')?t.accent:t.faint,\n      tabTasks:s==='tasks'?t.accent:t.faint, tabMore:t.faint,\n      dirABtn:this.btn(this.state.dir==='A'), dirBBtn:this.btn(this.state.dir==='B'),\n      dirLabel:this.state.dir==='A'?'Editorial Warm':'Linear Ledger',\n      setDirA:()=>this.setState({dir:'A'}), setDirB:()=>this.setState({dir:'B'}),\n      marigoldBtn:this.btn(this.state.accent==='marigold'), maroonBtn:this.btn(this.state.accent==='maroon'),\n      lightBtn:this.btn(this.state.mode==='light'), darkBtn:this.btn(this.state.mode==='dark'),\n      resetBtn:`border:none;cursor:pointer;padding:7px 11px;border-radius:9px;font-family:'Geist',sans-serif;font-size:13px;background:transparent;color:#7d756b;`,\n      setMarigold:()=>this.setState({accent:'marigold'}), setMaroon:()=>this.setState({accent:'maroon'}),\n      setLight:()=>this.setState({mode:'light'}), setDark:()=>this.setState({mode:'dark'}),\n      goLogin:this.go('login'), goOnboard:this.go('onboard'), goDash:this.go('dashboard'),\n      goVendors:this.go('vendors'), goTasks:this.go('tasks'), goVoice:this.go('voice'), goAdd:this.go('add'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
